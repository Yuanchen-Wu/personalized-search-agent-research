experiment_name: adaptive_loop_v1

# ── STATUS: PARKED — not in current C3 scope (2026-07-18). Incremental deepening
#    is deliberately set aside; active C3 work is the "re-fanout until good" path
#    (configs/adaptive_refanout_v1.yaml). Kept for a possible later mechanism-A/B
#    study; not run or maintained now.
#
# Adaptive loop (C3). Two method families (optional strictness suffix, e.g.
# adaptive_b8_strict / adaptive_k4_lenient):
#   adaptive_kN = FIXED budget (mechanism A): spends EXACTLY N searches, iteratively
#     selected; cost-matched to fixed_kN so the quality delta isolates the reasoning
#     loop. This is the clean, directly-comparable arm.
#   adaptive_bN = VARIABLE budget (mechanism B): early-stops when evidence is deemed
#     sufficient (N is a cap); traces the "less search, same quality" cost frontier.
methods:
  - adaptive_k4
  - adaptive_b4
  - adaptive_b6
  - adaptive_b8
  - adaptive_b12

adaptive:
  seed_size: 2          # round-1 seed = top-2 of the shared ordered plan (ties to fixed_k2)
  max_rounds: 5         # >=1 seed round + up to (max_rounds-1) assess/retrieve rounds
  per_round_cap: 4      # variable (bN) arms: max NEW branches accepted per assess round
  fixed_budget_per_round_cap: 1  # fixed (kN) arms: 1 new query/round -> each fully evidence-conditioned
  default_strictness: balanced   # lenient | balanced | strict

# candidate_pool_size kept for parity; the adaptive seed always draws from an
# 8-branch shared plan (adaptive_loop.SEED_PLAN_POOL_SIZE) so C2's plan cache is hit.
fixed_fanout:
  candidate_pool_size: 8

search:
  search_depth: basic
  max_results_per_branch: 5

synthesis:
  evidence_budget_mode: all # 'all' or 'fixed_document_budget'
  max_documents: null
  max_context_chars: null

models:
  planner: null
  synthesizer: null
  assessor: null      # falls back to DEFAULT_GEMINI_MODEL (gemini-flash-latest)
  evaluator: null

reproducibility:
  seed: 42
  cache_fanout_plans: true
  cache_search_results: true
  resume_existing_runs: true

data:
  personas_path: data/synthetic_personas_v1.jsonl
  queries_path: data/synthetic_queries_v1.jsonl

# For the combined frontier: the summarizer merges these dirs' runs+scores with
# this experiment's, so fixed_k* and adaptive_* land on ONE quality_cost_frontier.csv
# without re-scoring the frozen 288 C2 runs.
additional_result_dirs:
  - outputs/fixed_fanout_scaling_v1

outputs:
  run_dir: outputs/adaptive_loop_v1
  runs_path: outputs/adaptive_loop_v1/runs.jsonl
  # REUSE C2's caches so round-1 seeds are cache hits (no new plan/seed-search cost):
  fanout_plans_path: outputs/fixed_fanout_scaling_v1/fanout_plans.jsonl
  search_cache_path: outputs/fixed_fanout_scaling_v1/search_cache.jsonl
  # Score + summary artifacts stay under this experiment's own dir:
  fanout_scores_path: outputs/adaptive_loop_v1/fanout_scores.jsonl
  retrieval_scores_path: outputs/adaptive_loop_v1/retrieval_scores.jsonl
  final_response_scores_path: outputs/adaptive_loop_v1/final_response_scores.jsonl
  summary_by_method_path: outputs/adaptive_loop_v1/summary_by_method.csv
  summary_by_method_task_type_path: outputs/adaptive_loop_v1/summary_by_method_task_type.csv
  summary_by_method_task_category_path: outputs/adaptive_loop_v1/summary_by_method_task_category.csv
  summary_by_method_domain_path: outputs/adaptive_loop_v1/summary_by_method_domain.csv
  quality_cost_frontier_path: outputs/adaptive_loop_v1/quality_cost_frontier.csv
  marginal_gains_path: outputs/adaptive_loop_v1/marginal_gains.csv
