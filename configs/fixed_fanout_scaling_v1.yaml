experiment_name: fixed_fanout_scaling_v1

methods:
  - fixed_k1
  - fixed_k2
  - fixed_k4
  - fixed_k8

fixed_fanout:
  candidate_pool_size: 8
  k_values: [1, 2, 4, 8]
  use_nested_prefixes: true

search:
  search_depth: basic
  max_results_per_branch: 5

synthesis:
  evidence_budget_mode: all # 'all' or 'fixed_document_budget'
  max_documents: null
  max_context_chars: null

models:
  planner: null
  synthesizer: null
  evaluator: null

reproducibility:
  seed: 42
  cache_fanout_plans: true
  cache_search_results: true
  resume_existing_runs: true

data:
  personas_path: data/synthetic_personas_v1.jsonl
  queries_path: data/synthetic_queries_v1.jsonl

outputs:
  run_dir: outputs/fixed_fanout_scaling_v1
  runs_path: outputs/fixed_fanout_scaling_v1/runs.jsonl
  fanout_plans_path: outputs/fixed_fanout_scaling_v1/fanout_plans.jsonl
  search_cache_path: outputs/fixed_fanout_scaling_v1/search_cache.jsonl
  fanout_scores_path: outputs/fixed_fanout_scaling_v1/fanout_scores.jsonl
  retrieval_scores_path: outputs/fixed_fanout_scaling_v1/retrieval_scores.jsonl
  final_response_scores_path: outputs/fixed_fanout_scaling_v1/final_response_scores.jsonl
  summary_by_method_path: outputs/fixed_fanout_scaling_v1/summary_by_method.csv
  summary_by_method_task_type_path: outputs/fixed_fanout_scaling_v1/summary_by_method_task_type.csv
  summary_by_method_task_category_path: outputs/fixed_fanout_scaling_v1/summary_by_method_task_category.csv
  summary_by_method_domain_path: outputs/fixed_fanout_scaling_v1/summary_by_method_domain.csv
  quality_cost_frontier_path: outputs/fixed_fanout_scaling_v1/quality_cost_frontier.csv
  marginal_gains_path: outputs/fixed_fanout_scaling_v1/marginal_gains.csv
