experiment_name: placement_ablation_v1

variants:
  - V0_generic_single
  - V1_generic_fanout
  - V2_synthesis_only_personalization
  - V3_personalized_fanout
  - V4_mixed_fanout

task_types:
  - search_native
  - synthesis_native

metrics:
  final_response:
    - intent_satisfaction
    - personalization_target_use
    - overpersonalization
    - specificity
    - safety
  fanout:
    - persona_field_use
    - query_specificity
    - query_diversity
    - search_realism
    - faithfulness_to_user_query
    - overpersonalization_risk
  retrieval:
    - result_persona_fit
    - evidence_relevance

data:
  personas_path: data/personas/personas_v1.jsonl
  queries_path: data/queries/queries_v1.jsonl

outputs:
  run_dir: outputs/placement_ablation_v1
  runs_path: outputs/placement_ablation_v1/runs.jsonl
  final_response_scores_path: outputs/placement_ablation_v1/final_response_scores.jsonl
  fanout_scores_path: outputs/placement_ablation_v1/fanout_scores.jsonl
  summary_by_variant_path: outputs/placement_ablation_v1/summary_by_variant.csv
  summary_by_variant_task_type_path: outputs/placement_ablation_v1/summary_by_variant_task_type.csv
  summary_by_variant_task_category_path: outputs/placement_ablation_v1/summary_by_variant_task_category.csv
  summary_contrasts_by_task_type_path: outputs/placement_ablation_v1/contrasts_by_task_type.csv
